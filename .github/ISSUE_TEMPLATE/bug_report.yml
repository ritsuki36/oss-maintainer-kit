name: Bug report
description: Report something that is not working as expected.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include the command you ran and the repository shape if relevant.
      placeholder: |
        1. Run `node bin/oss-maintainer-kit.mjs check .`
        2. See ...
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "22.x"
  - type: textarea
    id: output
    attributes:
      label: CLI output
      description: Paste the relevant output if available.
